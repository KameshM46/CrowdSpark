<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/styles.css">
    <title>Forgot-Password</title>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <h1>⚡ Crowdspark Account Recovery</h1>
            </div>
        </div>
    </nav>
    <section class="forgot">
        <div class="forgot-card">
            <img src="robot.png" alt="Robot" class="forgot-robot">
            <h1>Forgot Your Password ?</h1>
            <p>Enter your email address and we'll send you instructions to reset your password.</p>
            <form id="forgot-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="your@gmail.com">
                </div>
                <button type="submit" class="btn btn-primary half-width">Submit</button>
            </form>
        </div>
         
    </section>
</body>
</html>
