<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Crowdspark</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <h1>⚡ Crowdspark</h1>
            </div>
        </div>
    </nav>

    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-card">
                <h1>Welcome Back</h1>
                <p>Login to your Crowdspark account</p>
                
                <form id="login-form">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required placeholder="your@email.com">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required placeholder="••••••••">
                        <a href="forgot-password.html" class="forgot-password">Forgot Password</a>
                    </div>
                    <button type="submit" class="btn btn-primary full-width">Login</button>
                </form>

                <p class="auth-switch">Don't have an account? <a href="signup.html">Sign up here</a></p>
            </div>

            <div class="auth-info">
                <h2>Join Crowdspark</h2>
                <ul>
                    <li>✓ Support innovative projects</li>
                    <li>✓ Create your own campaigns</li>
                    <li>✓ Connect with creators worldwide</li>
                    <li>✓ Track your pledges and rewards</li>
                </ul>
            </div>
        </div>
    </section>

    <script src="../js/common.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
