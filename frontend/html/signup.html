<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Crowdspark</title>
    <link rel="stylesheet" href="../css/styles.css">
    <script type="text/javascript" src="../javascript/validation.js" defer ></script>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <h1>⚡ Crowdspark</h1>
            </div>
        </div>
    </nav>

    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-card">
                <h1>Create Account</h1>
                <p>Join Crowdspark and start making an impact</p>
                <p id="error_message"></p>
                <form id="signup-form">

                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" placeholder="your_username" minlength="3">
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="your@email.com">
                    </div>
                    <div class="form-group">
                        <label for="first-name">First Name</label>
                        <input type="text" id="first-name" name="firstName" placeholder="John">
                    </div>
        
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" minlength="6">
                    </div>

                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" id="confirmpassword" name="confirmpassword" placeholder="••••••••">
                    </div>

                    <div class="form-group">
                        <label for="role">I want to be</label>
                        <select id="role" name="role">
                            <option value="backer">Support Projects (Backer)</option>
                            <option value="creator">Create Campaigns (Creator)</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary full-width">Create Account</button>
                </form>

                <p class="auth-switch">Already have an account? <a href="login.html">Login here</a></p>
            </div>

            <div class="auth-info">
                <h2>Why Join Crowdspark?</h2>
                <ul>
                    <li>✓ Secure and trusted platform</li>
                    <li>✓ Support creators you believe in</li>
                    <li>✓ Transparent fee structure</li>
                    <li>✓ Regular updates and communication</li>
                </ul>
            </div>
        </div>
    </section>

    <script src="../js/common.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
